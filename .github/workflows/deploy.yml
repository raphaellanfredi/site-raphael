name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/site-raphael:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger redeploy via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "--- testando alcance da porta 22 ---"
          (echo > /dev/tcp/$VPS_HOST/22) >/dev/null 2>&1 && echo "porta 22 alcançável" || echo "porta 22 INALCANÇÁVEL"
          echo "--- ssh-keyscan ---"
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          echo "--- conectando via ssh -v ---"
          ssh -v -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 "$VPS_USER@$VPS_HOST" "deploy"
