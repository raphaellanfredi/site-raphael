name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/site-raphael:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger redeploy via Portainer API
        env:
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
        run: |
          PAYLOAD=$(jq -n --rawfile content docker-compose.yml \
            '{stackFileContent: $content, env: [], prune: false, pullImage: true}')
          curl -sf -X PUT \
            -H "X-API-Key: $PORTAINER_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://portainer.evainteligencia.com.br/api/stacks/55?endpointId=1" \
            -d "$PAYLOAD"
