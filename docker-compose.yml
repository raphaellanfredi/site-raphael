services:
  site-raphael:
    image: raphaellanfredi/site-raphael:latest
    environment:
      - NODE_ENV=production
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        # Cobre o domínio com e sem "www" desde o início (a stack da EVA
        # só cobre o "www", causando 404 no domínio puro — não repetir aqui).
        - "traefik.http.routers.site-raphael.rule=Host(`raphaellanfredi.com.br`) || Host(`www.raphaellanfredi.com.br`)"
        - "traefik.http.routers.site-raphael.entrypoints=websecure"
        - "traefik.http.routers.site-raphael.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.site-raphael.loadbalancer.server.port=3000"
    # Sem "ports:" — o Traefik acessa o container pela rede overlay
    # "network_public" diretamente, sem publicar porta no host.
    # "container_name" não é usado em modo Swarm — o Docker nomeia
    # automaticamente as réplicas do serviço.

networks:
  network_public:
    external: true
    # Rede overlay (scope swarm) confirmada via `docker network inspect
    # network_public` — o serviço traefik_traefik está conectado a ela,
    # junto com eva_nginx e mysql_mysql.
